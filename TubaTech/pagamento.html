<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>TubaTech</title>

  <link rel="stylesheet" href="css/pagamento.css">
  <link rel="shortcut icon" href="img/favicon-32x32.png" type="image/png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
  <!-- Cabeçalho -->
  <header>
    <div class="logo">
      <img src="img/logo-removebg-preview.png" alt="Logo TubaTech">
    </div>
    <div class="search-container">
      <input type="text" placeholder="pesquise por produtos">
      <button class="search-button">
        <i class="fas fa-search"></i>
      </button>
    </div>
    <div class="user-actions">
      <a href="carrinho.html" title="Carrinho"><i class="fas fa-shopping-cart"></i></a>
      <a href="#" title="Perfil"><i class="fas fa-user"></i></a>
    </div>
  </header>



  <main>
  <div class="pagamento-container">
    <div id="resumo-pagamento">
      <!-- Valores calculados via JS -->
    </div>

    <h3>2. Forma de Pagamento</h3>
    <form id="form-pagamento">
      <label>
        <input type="radio" name="pagamento" value="pix" required>
        Pix <span class="desconto">(10% de desconto)</span>
      </label>
      <label><input type="radio" name="pagamento" value="credito"> Cartão de Crédito</label>
      <label><input type="radio" name="pagamento" value="debito"> Cartão de Débito</label>

      <button type="submit">Concluir Compra</button>
    </form>

    <p id="mensagem-final" class="sucesso" style="display: none;">Pagamento concluído com sucesso! 🎉</p>
  </div>
</main>

  <!-- Rodapé -->
  <footer>
    <div class="footer-content">
      <div class="footer-logo">
        <img src="img/logo-removebg-preview.png" alt="Logo TubaTech">
      </div>
      <p>Contato: contatotubatech@gmail.com</p>
      <div class="footer-social">
        <a href="#"><i class="fab fa-facebook-f"></i></a>
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fab fa-twitter"></i></a>
      </div>
    </div>
  </footer>

  <script src="js/pagamento.js"></script>
</body>

</html>
