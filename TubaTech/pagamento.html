<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Pagamento - TubaTech</title>
  <link rel="stylesheet" href="/TubaTech/css/pagamento.css">
  <link rel="shortcut icon" href="/TubaTech/img/favicon-32x32.png" type="image/png">
</head>

<body>
  <header>
    <div class="logo">
      <a href="/TubaTech/index.html">
        <img src="/TubaTech/img/logo-removebg-preview.png" alt="Logo TubaTech" height="40">
      </a>
    </div>
    <h2>Finalizar Pagamento</h2>
  </header>

  <main class="pagamento-container">
    <div id="resumo-pagamento">
      <!-- Valores calculados via JS -->
    </div>

    <h3>Escolha a forma de pagamento:</h3>
    <form id="form-pagamento">
      <label><input type="radio" name="pagamento" value="pix" required> Pix (10% de desconto)</label><br>
      <label><input type="radio" name="pagamento" value="credito"> Cartão de Crédito</label><br>
      <label><input type="radio" name="pagamento" value="debito"> Cartão de Débito</label><br><br>
      <button type="submit">Concluir Compra</button>
    </form>

    <p id="mensagem-final" class="sucesso" style="display: none;">Pagamento concluído com sucesso! 🎉</p>
  </main>

  <footer>
    <p>&copy; 2025 TubaTech - Todos os direitos reservados.</p>
  </footer>

  <script src="/TubaTech/js/pagamento.js"></script>
</body>
</html>
